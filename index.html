<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Asistente de navegación</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#c7f7d4,#cfe9ff);
text-align:center;
margin:0;
}

button{
padding:12px 25px;
font-size:18px;
background:#7edbb5;
border:none;
border-radius:10px;
margin:8px;
cursor:pointer;
}

#map{
height:400px;
margin-top:20px;
}

</style>

</head>

<body>

<h2>Asistente GPS</h2>

<button onclick="ubicar()">Saber dónde estoy</button>

<button onclick="decirDestino()">Decir destino 🎤</button>

<div id="direccion"></div>
<div id="distancia"></div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let latUsuario;
let lonUsuario;
let map;
let ruta;


function hablar(t){

let voz = new SpeechSynthesisUtterance(t);
voz.lang="es-MX";
speechSynthesis.speak(voz);

}


function ubicar(){

navigator.geolocation.getCurrentPosition(function(pos){

latUsuario = pos.coords.latitude;
lonUsuario = pos.coords.longitude;

obtenerDireccion();

iniciarMapa();

});

}



function obtenerDireccion(){

fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latUsuario}&lon=${lonUsuario}&format=json&addressdetails=1`)
.then(r=>r.json())
.then(data=>{

let d=data.address;

let calle=d.road||"calle desconocida";
let ciudad=d.city||d.town||d.village||d.municipality||"";
let estado=d.state||"";
let cp=d.postcode||"";
let pais=d.country||"";

let dir = calle+", "+ciudad+", "+estado+", "+cp+", "+pais;

document.getElementById("direccion").innerHTML=dir;

hablar("Estás en "+dir);

});

}



function iniciarMapa(){

map = L.map('map').setView([latUsuario,lonUsuario],16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

L.marker([latUsuario,lonUsuario]).addTo(map)
.bindPopup("Tu ubicación")
.openPopup();

}



function decirDestino(){

let rec = new webkitSpeechRecognition();
rec.lang="es-MX";

rec.onresult=function(e){

let destino = e.results[0][0].transcript;

buscarDestino(destino);

};

rec.start();

}



function buscarDestino(lugar){

fetch(`https://nominatim.openstreetmap.org/search?q=${lugar}&format=json`)
.then(r=>r.json())
.then(data=>{

if(data.length==0){

hablar("No encontré ese lugar");
return;

}

let latDestino=data[0].lat;
let lonDestino=data[0].lon;

calcularRuta(latDestino,lonDestino,lugar);

});

}



function calcularRuta(latDestino,lonDestino,lugar){

let url=`https://router.project-osrm.org/route/v1/foot/${lonUsuario},${latUsuario};${lonDestino},${latDestino}?overview=full&geometries=geojson`;

fetch(url)
.then(r=>r.json())
.then(data=>{

let dist = data.routes[0].distance;
dist = Math.round(dist);

document.getElementById("distancia").innerHTML=
"Estás a "+dist+" metros de "+lugar;

hablar("Estás a "+dist+" metros de "+lugar);

if(ruta) map.removeLayer(ruta);

ruta=L.geoJSON(data.routes[0].geometry).addTo(map);

map.fitBounds(ruta.getBounds());

});

}

</script>

</body>
</html>
